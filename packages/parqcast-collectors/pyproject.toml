[project]
name = "parqcast-collectors"
version = "0.1.0"
description = "SQL-based collectors and orchestrator for the parqcast data pipe"
requires-python = "==3.12.3"
dependencies = [
    "parqcast-core>=0.1.0",
    "pyarrow>=23.0.1",
]

[tool.uv.sources]
parqcast-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/parqcast"]
