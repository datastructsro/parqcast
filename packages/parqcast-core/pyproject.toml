[project]
name = "parqcast-core"
version = "0.1.0"
description = "Schemas, transport, tracking, and protocols for the parqcast data pipe"
requires-python = "==3.12.3"
dependencies = [
    "pyarrow>=23.0.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/parqcast"]
