[project]
name = "parqcast-transport-http"
version = "0.1.0"
description = "HTTP transport for parqcast — uploads raw Parquet to parqcast-server"
requires-python = "==3.12.3"
dependencies = [
    "parqcast-core>=0.1.0",
]

[tool.uv.sources]
parqcast-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/parqcast"]
